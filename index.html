<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta name="theme-color" content="#000000" />

  <meta
    name="description"
    content="DORIQ - Global Digital Wallet for Secure Transactions, Bill Payments, Crypto, and Global Financial Services"
  />

  <meta
    name="keywords"
    content="DORIQ, digital wallet, crypto, fintech, money transfer, bill payment, virtual card"
  />

  <meta name="author" content="DORIQ Technologies" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <meta
    name="apple-mobile-web-app-title"
    content="DORIQ"
  />

  <meta
    name="mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="format-detection"
    content="telephone=no"
  />

  <!-- Open Graph -->
  <meta
    property="og:title"
    content="DORIQ - Global Digital Wallet"
  />

  <meta
    property="og:description"
    content="Secure global digital wallet for transactions, bill payments, crypto and financial services."
  />

  <meta
    property="og:type"
    content="website"
  />

  <!-- PWA -->
  <link
    rel="manifest"
    href="/manifest.json"
  />

  <!-- Existing favicon file -->
  <link
    rel="icon"
    type="image/svg+xml"
    href="/favicon.svg"
  />

  <!-- Optional fallback -->
  <link
    rel="alternate icon"
    href="/logo.svg"
  />

  <!-- Fonts -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <title>DORIQ - Global Digital Wallet</title>
</head>

<body>
  <div id="root"></div>

  <!-- Vite Entry -->
  <script
    type="module"
    src="/src/main.jsx"
  ></script>

  <!-- Service Worker -->
  <script>
    if (
      "serviceWorker" in navigator &&
      location.protocol === "https:"
    ) {
      window.addEventListener("load", async () => {
        try {
          const registration =
            await navigator.serviceWorker.register(
              "/service-worker.js"
            );

          console.log(
            "✅ Service Worker registered:",
            registration.scope
          );
        } catch (error) {
          console.error(
            "❌ Service Worker registration failed:",
            error
          );
        }
      });
    }
  </script>
</body>
</html>
