  <path d="M 50 50 L 53 57 L 60 60 L 53 63 L 50 70 L 47 63 L 40 60 L 47 57 Z" fill="#FFFFFF" opacity="0.6" />
  <path d="M 150 140 L 152 144 L 156 146 L 152 148 L 150 152 L 148 148 L 144 146 L 148 144 Z" fill="#FFFFFF" opacity="0.4" />
  
  <!-- Bottom Text -->
  <text x="100" y="175" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="12" font-weight="bold" letter-spacing="3" opacity="0.8">
